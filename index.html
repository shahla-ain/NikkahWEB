<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikah Invites — Launching Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #d4af37;
}

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: #0b141a;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* 🌙 Moon */
.moon {
  position: absolute;
  top: 10%;
  right: 10%;
  width: 120px;
  height: 120px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(255,255,255,0.6);
}

.moon::after {
  content: "";
  position: absolute;
  top: 0;
  left: 30px;
  width: 120px;
  height: 120px;
  background: #0b141a;
  border-radius: 50%;
}

/* ⭐ Stars */
.stars span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.8;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* Container */
.container {
  text-align: center;
  padding: 30px;
  width: 90%;
  max-width: 420px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* Image */
.image-box {
  width: 200px;
  height: 260px;
  margin: auto;
  border-radius: 15px;
  overflow: hidden;
  border: 1px solid rgba(212,175,55,0.4);
  box-shadow: 0 0 25px rgba(212,175,55,0.3);
  animation: float 5s ease-in-out infinite;
}

.image-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Title */
h1 {
  font-family: 'Cinzel', serif;
  font-size: 2.2rem;
  margin-top: 20px;
  color: var(--gold);
}

/* Countdown */
.countdown {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 20px 0;
}

.countdown div {
  text-align: center;
}

.countdown span {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--gold);
}

/* Footer */
.footer {
  font-size: 0.9rem;
  opacity: 0.8;
}

.footer strong {
  color: var(--gold);
}

/* Animations */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<!-- 🌙 Moon -->
<div class="moon"></div>

<!-- ⭐ Stars -->
<div class="stars">
  <span style="top:10%; left:20%"></span>
  <span style="top:30%; left:70%"></span>
  <span style="top:60%; left:40%"></span>
  <span style="top:80%; left:80%"></span>
  <span style="top:50%; left:10%"></span>
</div>

<div class="container">

  <div class="image-box">
    <img src="Nikkah.png" alt="Couple">
  </div>

  <h1>Launching Soon</h1>

  <!-- ⏳ Countdown -->
  <div class="countdown">
    <div><span id="days">00</span><br>Days</div>
    <div><span id="hours">00</span><br>Hours</div>
    <div><span id="minutes">00</span><br>Min</div>
    <div><span id="seconds">00</span><br>Sec</div>
  </div>

  <div class="footer">
    Web developing by <br>
    <strong>Ashik Muhammed & Fidha</strong>
  </div>

</div>

<script>
// ⏳ Set your launch date here
const launchDate = new Date("2026-09-01 00:00:00").getTime();

const timer = setInterval(() => {
  const now = new Date().getTime();
  const diff = launchDate - now;

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / (1000 * 60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("days").innerText = d;
  document.getElementById("hours").innerText = h;
  document.getElementById("minutes").innerText = m;
  document.getElementById("seconds").innerText = s;
}, 1000);
</script>

</body>
</html>
